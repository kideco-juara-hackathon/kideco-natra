services:
  postgres:
    image: postgres:16-alpine
    container_name: kideco-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kideco}
      POSTGRES_USER: ${POSTGRES_USER:-kideco}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kideco}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-kideco} -d ${POSTGRES_DB:-kideco}']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kideco-backend
    environment:
      APP_NAME: KIDECO Backend
      ENVIRONMENT: docker
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-kideco}:${POSTGRES_PASSWORD:-kideco}@postgres:5432/${POSTGRES_DB:-kideco}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://127.0.0.1:3000}
      FUEL_PRICE_PER_LITER: ${FUEL_PRICE_PER_LITER:-15000}
      DEFAULT_LOADING_TIME_SECONDS: ${DEFAULT_LOADING_TIME_SECONDS:-420}
      DEFAULT_ETA_THRESHOLD_SECONDS: ${DEFAULT_ETA_THRESHOLD_SECONDS:-600}
    ports:
      - '${BACKEND_PORT:-8000}:8000'
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "python scripts/wait_for_db.py && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped

volumes:
  postgres_data:
