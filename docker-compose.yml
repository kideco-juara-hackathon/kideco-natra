services:
  rabbitmq:
    image: rabbitmq:4-management
    container_name: kideco-rabbitmq
    restart: unless-stopped
    mem_limit: 256m
    mem_reservation: 128m
    ports:
      - "127.0.0.1:${RABBITMQ_AMQP_PORT:-7256}:5672"     # AMQP port
      - "127.0.0.1:${RABBITMQ_MGMT_PORT:-15672}:15672"   # Management UI
      - "127.0.0.1:${RABBITMQ_MQTT_PORT:-6743}:1883"     # MQTT port
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-kideco}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-kideco}
      RABBITMQ_NODENAME: rabbit@rabbitmq
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "+S 2:2 +sbwt none +sbwtdcpu none +sbwtdio none"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    command: >
      bash -c "
        rabbitmq-plugins enable --offline rabbitmq_mqtt &&
        rabbitmq-server
      "
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: kideco-mosquitto
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MOSQUITTO_PORT:-1884}:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -t healthcheck -m ok -q 0 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: kideco-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kideco}
      POSTGRES_USER: ${POSTGRES_USER:-kideco}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kideco}
    ports:
      - '127.0.0.1:${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-kideco} -d ${POSTGRES_DB:-kideco}']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    # image: user312982/kideco:backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kideco-backend
    mem_limit: 512m
    environment:
      APP_NAME: KIDECO Backend
      ENVIRONMENT: docker
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-kideco}:${POSTGRES_PASSWORD:-kideco}@postgres:5432/${POSTGRES_DB:-kideco}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://127.0.0.1:3000}
      FUEL_PRICE_PER_LITER: ${FUEL_PRICE_PER_LITER:-15000}
      DEFAULT_LOADING_TIME_SECONDS: ${DEFAULT_LOADING_TIME_SECONDS:-420}
      DEFAULT_ETA_THRESHOLD_SECONDS: ${DEFAULT_ETA_THRESHOLD_SECONDS:-600}
      ML_ETA_DIR: /ml_models/eta
      ML_FUEL_DIR: /ml_models/fuel
      ML_MAINTENANCE_DIR: /ml_models/maintenance
    volumes:
      - ./data:/data:ro
      - ../kideco-ml-eta/results:/ml_models/eta:ro
      - ../kideco-ml-fuel/results:/ml_models/fuel:ro
      - ../kideco-ml-maintenance/results:/ml_models/maintenance:ro
    ports:
      - '127.0.0.1:${BACKEND_PORT:-8001}:8000'
    networks:
      - default
      - caddy_network
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "python scripts/wait_for_db.py && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped

  frontend:
    image: user312982/kideco:frontend
    # build:
    #   context: ./frontend
    #   dockerfile: Dockerfile
    #   args:
    #     NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8001}
    container_name: kideco-frontend
    mem_limit: 512m
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3001}:3000"
    networks:
      - default
      - caddy_network
    environment:
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8001}
    depends_on:
      - backend
    restart: unless-stopped

  simulator:
    image: user312982/kideco:simulator
    # build:
    #   context: ./simulator
    #   dockerfile: Dockerfile
    container_name: kideco-simulator
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  rabbitmq_data:
  mosquitto_data:
  mosquitto_logs:
  postgres_data:

networks:
  caddy_network:
    external: true
