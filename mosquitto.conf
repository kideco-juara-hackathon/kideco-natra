## Mosquitto MQTT Broker Configuration

# Listener
listener 1883
protocol mqtt

# Allow anonymous connections (set to false and configure password_file for production)
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# Connection settings
max_connections -1
max_keepalive 65535
